<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改密码 - 耍牌公司管理系统</title>
    <link href="{{ url_for('static', path='/css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .password-card { width: 100%; max-width: 440px; padding: 20px; }
    </style>
</head>
<body>
    <div class="card password-card shadow border-0">
        <div class="card-body">
            <h3 class="text-center mb-2 text-primary fw-bold">修改密码</h3>
            <div class="text-center text-muted small mb-4">
                {{ current_user.display_name }}，请设置新的登录密码
            </div>

            {% if request.query_params.get('error') %}
            <div class="alert alert-danger py-2">{{ request.query_params.get('error') }}</div>
            {% endif %}

            {% if current_user.must_change_password %}
            <div class="alert alert-warning py-2 small">
                当前账号使用临时密码登录，修改密码后才能继续使用系统。
            </div>
            {% endif %}

            <form action="/change-password" method="post">
                <div class="mb-3">
                    <label class="form-label">当前密码</label>
                    <input type="password" name="current_password" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" name="new_password" class="form-control" minlength="8" required>
                    <div class="form-text">至少 8 位，建议包含字母和数字。</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirm_password" class="form-control" minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">保存新密码</button>
            </form>

            <div class="text-center mt-3">
                <a href="/logout" class="text-decoration-none small text-muted">退出登录</a>
            </div>
        </div>
    </div>
</body>
</html>
