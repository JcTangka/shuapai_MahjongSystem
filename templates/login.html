<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 耍牌公司管理系统</title>
    <link href="{{ url_for('static', path='/css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; }
    </style>
</head>
<body>
    <div class="card login-card shadow border-0">
        <div class="card-body">
            <h3 class="text-center mb-4 text-primary fw-bold">耍牌·公司管理系统</h3>

            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label">账号</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">登 录</button>
            </form>

            <div class="text-center mt-3">
                <a href="/register" class="text-decoration-none small">注册新账号</a>
                <span class="text-muted mx-2 small">|</span>
                <a href="#" class="text-decoration-none small" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">忘记密码？</a>
            </div>
        </div>
    </div>

    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">忘记密码</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-2">普通员工请联系管理员重置临时密码。</p>
                    <p class="mb-0 text-muted small">管理员忘记密码时，请由系统维护人使用服务器本地脚本重置。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary w-100" data-bs-dismiss="modal">知道了</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill me-2"></i>登录失败</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-4 fs-5" id="errorMsg">
                    </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal">知道了</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', path='/js/bootstrap.bundle.min.js') }}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 获取 URL 中的查询参数
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');

            // 2. 如果存在 error 参数
            if (error) {
                // 设置错误信息文本
                document.getElementById('errorMsg').textContent = error;

                // 初始化并显示模态框
                var errorModal = new bootstrap.Modal(document.getElementById('errorModal'));
                errorModal.show();

                // (可选) 弹窗关闭后，清除 URL 里的 error 参数，防止刷新页面又弹出来
                const newUrl = window.location.pathname;
                window.history.replaceState({}, document.title, newUrl);
            }
        });
    </script>
</body>
</html>
